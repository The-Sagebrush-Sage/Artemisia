<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин работ | Artemisia</title>
    <link rel="icon" href="https://i.postimg.cc/zXXhVbHv/11.png" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary-dark: #1a1a1a;
            --secondary-dark: #2d2d2d;
            --accent-yellow: #FFD700;
            --accent-orange: #FFA500;
            --light-text: #f5f5f5;
            --gray-text: #aaaaaa;
            --card-bg: #252525;
            --border-radius: 8px;
            --transition: all 0.3s ease;
        }

        /* Общие стили для магазина */
        .shop-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--primary-dark);
            color: var(--light-text);
        }

        .shop-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .shop-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-yellow);
        }

        .shop-subtitle {
            font-size: 1.2rem;
            color: var(--gray-text);
        }

        /* Фильтры и категории */
        .shop-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background-color: var(--secondary-dark);
            border-radius: var(--border-radius);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: none;
            border-radius: 20px;
            color: var(--light-text);
            cursor: pointer;
            transition: var(--transition);
        }

        .category-btn:hover, .category-btn.active {
            background-color: var(--accent-yellow);
            color: var(--primary-dark);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-yellow);
        }

        .price-slider {
            width: 100%;
            margin: 10px 0;
        }

        .price-values {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        .filter-select {
            width: 100%;
            padding: 10px;
            background-color: var(--card-bg);
            border: 1px solid #444;
            border-radius: var(--border-radius);
            color: var(--light-text);
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 2px solid var(--accent-yellow);
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--accent-yellow);
        }

        .product-artist {
            color: var(--gray-text);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin-bottom: 15px;
        }

        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .product-tag {
            padding: 4px 8px;
            background-color: rgba(255, 215, 0, 0.2);
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .product-actions {
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--accent-yellow);
            color: var(--primary-dark);
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: var(--accent-orange);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--accent-yellow);
            color: var(--accent-yellow);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 215, 0, 0.1);
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 15px;
            background-color: var(--card-bg);
            border: 1px solid #444;
            border-radius: var(--border-radius);
            color: var(--light-text);
            cursor: pointer;
            transition: var(--transition);
        }

        .page-btn.active, .page-btn:hover {
            background-color: var(--accent-yellow);
            color: var(--primary-dark);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .shop-controls {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .categories {
                overflow-x: auto;
                padding-bottom: 10px;
            }
            
            .product-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .shop-title {
                font-size: 2rem;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Header с поисковой строкой -->
    <header>
        <!-- Ваш существующий хедер -->
    </header>

    <!-- Menu Drawer -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="drawer" id="drawer">
        <!-- Ваше существующее меню -->
    </div>

    <!-- Основной контент магазина -->
    <div class="shop-container">
        <div class="shop-header">
            <h1 class="shop-title">Магазин работ</h1>
            <p class="shop-subtitle">Уникальные творения от талантливых художников</p>
        </div>

        <div class="shop-controls">
            <div class="categories">
                <button class="category-btn active" data-category="all">Все работы</button>
                <button class="category-btn" data-category="2d">2D Арт</button>
                <button class="category-btn" data-category="3d">3D Модели</button>
                <button class="category-btn" data-category="animation">Анимация</button>
                <button class="category-btn" data-category="concept">Концепт-арт</button>
                <button class="category-btn" data-category="illustration">Иллюстрации</button>
                <button class="category-btn" data-category="portrait">Портреты</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="price-range">Диапазон цен</label>
                    <input type="range" min="0" max="10000" value="5000" class="price-slider" id="price-range">
                    <div class="price-values">
                        <span>0 руб.</span>
                        <span>5000 руб.</span>
                        <span>10000+ руб.</span>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="sort-by">Сортировка</label>
                    <select class="filter-select" id="sort-by">
                        <option value="newest">Сначала новые</option>
                        <option value="oldest">Сначала старые</option>
                        <option value="price-low">Цена (по возрастанию)</option>
                        <option value="price-high">Цена (по убыванию)</option>
                        <option value="popular">Популярные</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="resolution">Разрешение</label>
                    <select class="filter-select" id="resolution">
                        <option value="any">Любое</option>
                        <option value="hd">HD (1280x720)</option>
                        <option value="fullhd">Full HD (1920x1080)</option>
                        <option value="4k">4K (3840x2160)</option>
                        <option value="higher">Выше 4K</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="products-grid" id="products-grid">
            <!-- Карточки товаров будут добавляться через JavaScript -->
        </div>

        <div class="pagination">
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <!-- Ваш существующий футер -->
    </footer>

    <!-- Кнопки прокрутки -->
    <div id="backToBottomBtn" class="back-to-bottom-btn" onclick="scrollToBottom()">
        <!-- Ваша существующая кнопка -->
    </div>

    <div id="backToTopBtn" class="back-to-top-btn" onclick="scrollToTop()">
        <!-- Ваша существующая кнопка -->
    </div>

    <script>
        // Данные товаров (в реальном приложении будут загружаться с сервера)
        const productsData = [
            {
                id: 1,
                title: "Фэнтезийный пейзаж",
                artist: "Елена Художник",
                price: 4500,
                image: "https://i.postimg.cc/8z0W2C2j/fantasy-landscape.jpg",
                category: "2d",
                tags: ["пейзаж", "фэнтези", "цифровая живопись"],
                resolution: "4k",
                date: "2023-10-15"
            },
            {
                id: 2,
                title: "3D Модель дракона",
                artist: "Алексей 3D",
                price: 7500,
                image: "https://i.postimg.cc/8z0W2C2j/dragon-model.jpg",
                category: "3d",
                tags: ["3d", "дракон", "модель", "игровое искусство"],
                resolution: "fullhd",
                date: "2023-09-22"
            },
            {
                id: 3,
                title: "Анимированный персонаж",
                artist: "Мария Аниматор",
                price: 9200,
                image: "https://i.postimg.cc/8z0W2C2j/animated-character.gif",
                category: "animation",
                tags: ["анимация", "персонаж", "цикл ходьбы"],
                resolution: "hd",
                date: "2023-11-05"
            },
            {
                id: 4,
                title: "Портрет в стиле ар-нуво",
                artist: "Иван Портретист",
                price: 3200,
                image: "https://i.postimg.cc/8z0W2C2j/art-nouveau-portrait.jpg",
                category: "portrait",
                tags: ["портрет", "ар-нуво", "цифровая живопись"],
                resolution: "4k",
                date: "2023-10-28"
            },
            {
                id: 5,
                title: "Концепт-арт космического корабля",
                artist: "Дмитрий Концептер",
                price: 6100,
                image: "https://i.postimg.cc/8z0W2C2j/spaceship-concept.jpg",
                category: "concept",
                tags: ["концепт-арт", "космос", "корабль", "scifi"],
                resolution: "fullhd",
                date: "2023-09-10"
            },
            {
                id: 6,
                title: "Иллюстрация к сказке",
                artist: "Ольга Иллюстратор",
                price: 3800,
                image: "https://i.postimg.cc/8z0W2C2j/fairy-tale-illustration.jpg",
                category: "illustration",
                tags: ["иллюстрация", "сказка", "детская книга"],
                resolution: "4k",
                date: "2023-11-12"
            },
            {
                id: 7,
                title: "3D Модель средневекового замка",
                artist: "Алексей 3D",
                price: 12500,
                image: "https://i.postimg.cc/8z0W2C2j/castle-model.jpg",
                category: "3d",
                tags: ["3d", "замок", "средневековье", "архитектура"],
                resolution: "4k",
                date: "2023-08-17"
            },
            {
                id: 8,
                title: "Анимированный логотип",
                artist: "Сергей Дизайнер",
                price: 5400,
                image: "https://i.postimg.cc/8z0W2C2j/animated-logo.gif",
                category: "animation",
                tags: ["анимация", "логотип", "брендинг"],
                resolution: "hd",
                date: "2023-10-03"
            }
        ];

        // Функция для отображения товаров
        function renderProducts(products) {
            const productsGrid = document.getElementById('products-grid');
            productsGrid.innerHTML = '';

            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                
                productCard.innerHTML = `
                    <img src="${product.image}" alt="${product.title}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-artist">Автор: ${product.artist}</p>
                        <div class="product-price">${product.price} руб.</div>
                        <div class="product-tags">
                            ${product.tags.map(tag => `<span class="product-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-primary">Купить</button>
                            <button class="btn btn-secondary">В избранное</button>
                        </div>
                    </div>
                `;
                
                productsGrid.appendChild(productCard);
            });
        }

        // Инициализация магазина
        document.addEventListener('DOMContentLoaded', function() {
            // Первоначальная отрисовка товаров
            renderProducts(productsData);
            
            // Обработчики для категорий
            document.querySelectorAll('.category-btn').forEach(button => {
                button.addEventListener('click', function() {
                    // Убираем активный класс у всех кнопок
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    
                    // Добавляем активный класс текущей кнопке
                    this.classList.add('active');
                    
                    // Получаем категорию для фильтрации
                    const category = this.getAttribute('data-category');
                    
                    // Фильтруем товары
                    let filteredProducts = productsData;
                    if (category !== 'all') {
                        filteredProducts = productsData.filter(product => product.category === category);
                    }
                    
                    // Отрисовываем отфильтрованные товары
                    renderProducts(filteredProducts);
                });
            });
            
            // Обработчик для слайдера цены
            const priceSlider = document.getElementById('price-range');
            priceSlider.addEventListener('input', function() {
                const maxPrice = parseInt(this.value);
                const filteredProducts = productsData.filter(product => product.price <= maxPrice);
                renderProducts(filteredProducts);
            });
            
            // Обработчик для сортировки
            const sortSelect = document.getElementById('sort-by');
            sortSelect.addEventListener('change', function() {
                const sortValue = this.value;
                let sortedProducts = [...productsData];
                
                switch(sortValue) {
                    case 'newest':
                        sortedProducts.sort((a, b) => new Date(b.date) - new Date(a.date));
                        break;
                    case 'oldest':
                        sortedProducts.sort((a, b) => new Date(a.date) - new Date(b.date));
                        break;
                    case 'price-low':
                        sortedProducts.sort((a, b) => a.price - b.price);
                        break;
                    case 'price-high':
                        sortedProducts.sort((a, b) => b.price - a.price);
                        break;
                    case 'popular':
                        // В реальном приложении здесь была бы логика сортировки по популярности
                        sortedProducts.sort((a, b) => b.id - a.id); // временная заглушка
                        break;
                }
                
                renderProducts(sortedProducts);
            });
            
            // Обработчик для фильтра по разрешению
            const resolutionSelect = document.getElementById('resolution');
            resolutionSelect.addEventListener('change', function() {
                const resolutionValue = this.value;
                
                if (resolutionValue === 'any') {
                    renderProducts(productsData);
                    return;
                }
                
                const filteredProducts = productsData.filter(product => product.resolution === resolutionValue);
                renderProducts(filteredProducts);
            });
        });

        // Ваши существующие функции
        function toggleMenu() {
            // Ваша существующая реализация
        }

        // Остальные ваши функции...
    </script>
</body>

</html>
